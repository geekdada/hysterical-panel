# Full stack behind nginx. Copy backend/.env.example to .env and set PANEL_MASTER_KEY.
#
#   docker compose build
#   docker compose up -d
#
# Or build on start:
#
#   docker compose up -d --build
#
# Panel (default): http://localhost:8080
# PocketBase admin: http://localhost:8080/_/
#
# Backend and frontend are internal only; nginx routes /api and /_/ to the backend,
# everything else to the frontend. The frontend image is built with an empty
# VITE_API_BASE_URL so the browser uses same-origin API calls.

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PANEL_HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/geekdada/hysterical-panel-backend:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PANEL_MASTER_KEY: ${PANEL_MASTER_KEY:?Set PANEL_MASTER_KEY in .env}
      PANEL_FRONTEND_URL_BASE: ${PANEL_FRONTEND_URL_BASE:-http://localhost:8080}
      PANEL_CORS_MAX_AGE: ${PANEL_CORS_MAX_AGE:-7200}
      PB_ENCRYPTION_KEY: ${PB_ENCRYPTION_KEY:-}
      PB_DATA_DIR: /app/pb_data
      MMDB_DIR: /app/mmdb
    volumes:
      - panel-data:/app/pb_data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8090/api/openapi.json",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ghcr.io/geekdada/hysterical-panel-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:3000/login",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  panel-data:
