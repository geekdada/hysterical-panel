# Backend only. Copy backend/.env.example to .env in this directory and set PANEL_MASTER_KEY.
#
#   docker compose up -d
#
# First run: create a PocketBase superuser at http://localhost:8090/_/

services:
  backend:
    image: ghcr.io/geekdada/hysterical-panel-backend:latest
    restart: unless-stopped
    ports:
      - "${PANEL_HTTP_PORT:-8090}:8090"
    env_file:
      - path: .env
        required: false
    environment:
      PANEL_MASTER_KEY: ${PANEL_MASTER_KEY:?Set PANEL_MASTER_KEY in .env}
      PANEL_FRONTEND_URL_BASE: ${PANEL_FRONTEND_URL_BASE:-}
      PANEL_CORS_MAX_AGE: ${PANEL_CORS_MAX_AGE:-7200}
      PB_ENCRYPTION_KEY: ${PB_ENCRYPTION_KEY:-}
      PB_DATA_DIR: /app/pb_data
      MMDB_DIR: /app/mmdb
    volumes:
      - panel-data:/app/pb_data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8090/api/openapi.json",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  panel-data:
