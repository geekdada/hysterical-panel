name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      created: ${{ steps.version.outputs.created }}
      backend_tags: ${{ steps.version.outputs.backend_tags }}
      frontend_tags: ${{ steps.version.outputs.frontend_tags }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate release version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be a semver tag like v1.2.3 or v1.2.3-rc.1; got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          version_file="$(tr -d '[:space:]' < VERSION)"
          package_version="$(node -p "require('./frontend/package.json').version")"

          if [[ "$version_file" != "$version" ]]; then
            echo "VERSION ($version_file) must match release tag version ($version)" >&2
            exit 1
          fi

          if [[ "$package_version" != "$version" ]]; then
            echo "frontend/package.json version ($package_version) must match release tag version ($version)" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          created="$(git show -s --format=%cI HEAD)"

          repository="${GITHUB_REPOSITORY,,}"
          backend_image="ghcr.io/${repository}-backend"
          frontend_image="ghcr.io/${repository}-frontend"

          backend_tags="${backend_image}:${version}"
          frontend_tags="${frontend_image}:${version}"
          if [[ "$version" != *-* ]]; then
            IFS=. read -r major minor patch <<< "$version"
            backend_tags+=$'\n'"${backend_image}:${major}.${minor}"
            backend_tags+=$'\n'"${backend_image}:${major}"
            backend_tags+=$'\n'"${backend_image}:latest"
            frontend_tags+=$'\n'"${frontend_image}:${major}.${minor}"
            frontend_tags+=$'\n'"${frontend_image}:${major}"
            frontend_tags+=$'\n'"${frontend_image}:latest"
          fi

          {
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "created=$created"
            echo "backend_tags<<EOF"
            echo "$backend_tags"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "$frontend_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  backend:
    name: Build and publish backend image
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Generate OpenAPI schema
        shell: bash
        run: |
          set -euo pipefail

          cd backend
          PANEL_MASTER_KEY=skip go run . openapi-schema -o openapi.json

          mkdir -p "$RUNNER_TEMP/openapi"
          cp openapi.json "$RUNNER_TEMP/openapi/openapi.json"

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: backend-openapi-${{ needs.metadata.outputs.version }}
          path: ${{ runner.temp }}/openapi/openapi.json
          if-no-files-found: error
          retention-days: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
          tags: ${{ needs.metadata.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.title=hysterical-panel-backend
            org.opencontainers.image.description=Hysterical Panel backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    needs: [metadata, backend]

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download OpenAPI schema
        uses: actions/download-artifact@v4
        with:
          name: backend-openapi-${{ needs.metadata.outputs.version }}
          path: backend

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.metadata.outputs.frontend_tags }}
          labels: |
            org.opencontainers.image.title=hysterical-panel-frontend
            org.opencontainers.image.description=Hysterical Panel frontend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [metadata, backend, frontend]
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
      PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
      BACKEND_TAGS: ${{ needs.metadata.outputs.backend_tags }}
      FRONTEND_TAGS: ${{ needs.metadata.outputs.frontend_tags }}

    steps:
      - name: Compose release body
        shell: bash
        run: |
          set -euo pipefail

          pull_lines() {
            while IFS= read -r ref; do
              [[ -n "$ref" ]] && printf 'docker pull %s\n' "$ref"
            done <<< "$1"
          }

          {
            echo "## Docker images"
            echo
            echo "### Backend"
            echo
            echo '```sh'
            pull_lines "$BACKEND_TAGS"
            echo '```'
            echo
            echo "### Frontend"
            echo
            echo '```sh'
            pull_lines "$FRONTEND_TAGS"
            echo '```'
          } > release-body.md

          cat release-body.md

      - name: Create or update draft release
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            # Editing notes preserves the existing draft status, so a manual
            # re-run never accidentally publishes the release.
            gh release edit "$TAG" --repo "$REPO" --notes-file release-body.md
          elif [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$TAG" --repo "$REPO" --draft --prerelease \
              --title "$TAG" --notes-file release-body.md
          else
            gh release create "$TAG" --repo "$REPO" --draft \
              --title "$TAG" --notes-file release-body.md
          fi
