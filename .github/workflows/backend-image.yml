name: Backend Docker Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Validate release version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be a semver tag like v1.2.3 or v1.2.3-rc.1; got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          version_file="$(tr -d '[:space:]' < VERSION)"
          package_version="$(node -p "require('./frontend/package.json').version")"

          if [[ "$version_file" != "$version" ]]; then
            echo "VERSION ($version_file) must match release tag version ($version)" >&2
            exit 1
          fi

          if [[ "$package_version" != "$version" ]]; then
            echo "frontend/package.json version ($package_version) must match release tag version ($version)" >&2
            exit 1
          fi

          repository="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repository}-backend"

          tags="${image}:${version}"
          if [[ "$version" != *-* ]]; then
            IFS=. read -r major minor patch <<< "$version"
            tags+=$'\n'"${image}:${major}.${minor}"
            tags+=$'\n'"${image}:${major}"
            tags+=$'\n'"${image}:latest"
          fi

          {
            echo "version=$version"
            echo "image=$image"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.title=hysterical-panel-backend
            org.opencontainers.image.description=Hysterical Panel backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.release.published_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
